# mise configuration for chezmoi dotfiles project
# Development tools for shell scripting and testing

[tools]
"aqua:bats-core/bats-core" = "1.13.0"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:mikefarah/yq" = "4.52.4"
"aqua:suzuki-shunsuke/ghalint" = "1.5.5"
"github:buildkite/cli" = "3.32.2"
hk = "1.38.0"
jq = "1.8.1"
"npm:markdownlint-cli" = "0.48.0"
pkl = "0.31.0"
shfmt = "3.12.0"
stylua = "2.3.1"

[tasks.lint]
description = "Lint and auto-fix"
run = "hk fix"

[tasks.test]
description = "Run test suite"
run = "bats test/"
