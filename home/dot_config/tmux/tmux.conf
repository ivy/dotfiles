# Standalone tmux configuration (XDG: ~/.config/tmux/tmux.conf)
# Replaces gpakosz/.tmux framework with explicit settings + tmux-sensible
# See docs/tmux.md for keybinding reference, plugin management, and troubleshooting

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
# Load tmux-sensible first — provides sane defaults we build on
run-shell ~/.config/tmux/plugins/tmux-sensible/sensible.tmux

# ---------------------------------------------------------------------------
# Terminal & Display
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"

# Disable extended-keys to fix paste in Ghostty + neovim
# See: https://github.com/gpakosz/.tmux/issues/776
set -s extended-keys off

# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on

# ---------------------------------------------------------------------------
# Vi mode + copy
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Smart pane switching with awareness of Vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
# ---------------------------------------------------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ---------------------------------------------------------------------------
# Prefix-based pane navigation (fallback)
# ---------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------------------------------
# Utility bindings
# ---------------------------------------------------------------------------
# Clear terminal
bind-key C-l send-keys C-l \; clear-history

# Split panes
bind | split-window -h
bind - split-window -v

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Quick window switcher with mouse support (mobile-friendly)
bind w choose-tree -Zw

# Open Claude Code in chezmoi directory
bind e run-shell 'tmux new-window -c "$(chezmoi data | jq -r .chezmoi.workingTree)" -n "dotfiles" "claude"'

# ---------------------------------------------------------------------------
# Pane styling (Catppuccin — appearance-aware)
# ---------------------------------------------------------------------------
# Active border: Lavender | Inactive border: Overlay 0
# Active pane bg: Base | Inactive pane bg: Mantle
run-shell ~/.local/libexec/dotfiles/tmux-apply-theme
set-hook -g client-focus-in 'run-shell -b ~/.local/libexec/dotfiles/tmux-apply-theme'

# ---------------------------------------------------------------------------
# Powerline status bar
# ---------------------------------------------------------------------------
run-shell ~/.config/tmux/plugins/tmux-powerline/main.tmux
