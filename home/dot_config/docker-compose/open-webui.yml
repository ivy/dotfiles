version: '3.7'

services:
  tailscale:
    image: tailscale/tailscale:latest@sha256:d6734d69fd7d31b1861589e347463954aa6097f9a61aa4f8f763ba94bfe0e5b9
    hostname: ${TS_HOSTNAME:-open-webui}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:---advertise-tags=tag:container}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - "${TAILSCALE_STATE_DIR:-./tailscale-state}:/var/lib/tailscale"
      - "${TAILSCALE_CONFIG_DIR:-./tailscale-config}:/config:ro"
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main@sha256:18c1475e636245e2f439b59b4a2b38e1965c881856092d21e5efc38da7e1dac3
    container_name: open-webui-app
    depends_on:
      - tailscale
    network_mode: service:tailscale
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEBUI_AUTH=${WEBUI_AUTH:-False}
    volumes:
      - "${WEBUI_DATA_DIR:-./data}:/app/backend/data"
    restart: unless-stopped
